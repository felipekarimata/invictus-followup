<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helena Follow-up Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .status-card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
    }

    .status-card h3 {
      color: #666;
      font-size: 0.9em;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .status-card .value {
      font-size: 2.5em;
      font-weight: bold;
      color: #667eea;
      margin: 10px 0;
    }

    .status-card .status-indicator {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4caf50;
      margin-right: 8px;
    }

    .status-card .status-indicator.offline {
      background: #f44336;
    }

    .status-card .subtitle {
      color: #999;
      font-size: 0.9em;
      margin-top: 5px;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    button {
      background: white;
      color: #667eea;
      border: none;
      padding: 15px 30px;
      border-radius: 5px;
      font-size: 1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    button:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    button:active {
      transform: translateY(0);
    }

    button.primary {
      background: #4caf50;
      color: white;
    }

    button.primary:hover {
      background: #45a049;
    }

    .history-section {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .history-section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5em;
    }

    .history-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95em;
    }

    .history-table thead {
      background: #f5f5f5;
    }

    .history-table th {
      text-align: left;
      padding: 12px;
      color: #666;
      font-weight: 600;
      border-bottom: 2px solid #ddd;
    }

    .history-table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
    }

    .history-table tr:hover {
      background: #f9f9f9;
    }

    .badge {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: bold;
    }

    .badge.success {
      background: #d4edda;
      color: #155724;
    }

    .badge.error {
      background: #f8d7da;
      color: #721c24;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .no-data {
      text-align: center;
      padding: 30px;
      color: #999;
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 1.8em;
      }

      .status-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .history-table {
        font-size: 0.85em;
      }

      .history-table th,
      .history-table td {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🤖 Helena Follow-up</h1>
      <p>Sistema Automático de Follow-up via WhatsApp</p>
    </header>

    <div class="status-grid">
      <div class="status-card">
        <h3>Status do Sistema</h3>
        <span class="status-indicator" id="statusIndicator"></span>
        <div class="value" id="statusValue">Verificando...</div>
        <div class="subtitle" id="statusSubtitle"></div>
      </div>

      <div class="status-card">
        <h3>Mensagens Enviadas</h3>
        <div class="value" id="totalSent">--</div>
        <div class="subtitle">Neste período</div>
      </div>

      <div class="status-card">
        <h3>Erros</h3>
        <div class="value" id="totalErrors">--</div>
        <div class="subtitle">Requer atenção</div>
      </div>

      <div class="status-card">
        <h3>Próxima Execução</h3>
        <div class="value" id="nextExecution">--</div>
        <div class="subtitle" id="nextExecutionSubtitle"></div>
      </div>
    </div>

    <div class="actions">
      <button class="primary" onclick="runNow()">
        ▶️ Executar Agora (Teste)
      </button>
      <button onclick="refreshStatus()">
        🔄 Atualizar Status
      </button>
      <button onclick="clearHistory()">
        🗑️ Limpar Histórico
      </button>
    </div>

    <div class="history-section">
      <h2>📋 Histórico Recente</h2>
      <div id="historyContainer">
        <div class="loading">
          <div class="spinner"></div>
          Carregando histórico...
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    async function loadStatus() {
      try {
        const response = await fetch(`${API_BASE}/status`);
        const data = await response.json();

        // Atualizar status
        const indicator = document.getElementById('statusIndicator');
        const statusValue = document.getElementById('statusValue');
        const statusSubtitle = document.getElementById('statusSubtitle');

        if (data.status === 'online') {
          indicator.classList.remove('offline');
          statusValue.textContent = 'Online';
          statusSubtitle.textContent = 'Sistema operacional';
        } else {
          indicator.classList.add('offline');
          statusValue.textContent = 'Offline';
          statusSubtitle.textContent = 'Sistema parado';
        }

        // Atualizar contadores
        document.getElementById('totalSent').textContent = data.totalSent || 0;
        document.getElementById('totalErrors').textContent = data.totalErrors || 0;

        // Próxima execução
        if (data.nextExecution) {
          const nextDate = new Date(data.nextExecution);
          document.getElementById('nextExecution').textContent = nextDate.toLocaleTimeString('pt-BR', {
            hour: '2-digit',
            minute: '2-digit'
          });
          document.getElementById('nextExecutionSubtitle').textContent = nextDate.toLocaleDateString('pt-BR');
        }

        loadHistory();
      } catch (error) {
        console.error('Erro ao carregar status:', error);
        document.getElementById('statusValue').textContent = 'Erro';
      }
    }

    async function loadHistory() {
      try {
        const response = await fetch(`${API_BASE}/history`);
        const history = await response.json();

        const container = document.getElementById('historyContainer');

        if (!history || history.length === 0) {
          container.innerHTML = '<div class="no-data">Nenhum histórico ainda</div>';
          return;
        }

        let html = `
          <table class="history-table">
            <thead>
              <tr>
                <th>Horário</th>
                <th>Telefone</th>
                <th>Template</th>
                <th>Status</th>
                <th>Mensagem</th>
              </tr>
            </thead>
            <tbody>
        `;

        history.reverse().forEach(entry => {
          const time = new Date(entry.timestamp).toLocaleTimeString('pt-BR');
          const badge = `<span class="badge ${entry.status}">${entry.status === 'success' ? '✓ Sucesso' : '✗ Erro'}</span>`;

          html += `
            <tr>
              <td>${time}</td>
              <td>${entry.phone}</td>
              <td>${entry.template}</td>
              <td>${badge}</td>
              <td>${entry.message}</td>
            </tr>
          `;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
      } catch (error) {
        console.error('Erro ao carregar histórico:', error);
        document.getElementById('historyContainer').innerHTML =
          '<div class="no-data">Erro ao carregar histórico</div>';
      }
    }

    async function runNow() {
      if (!confirm('Executar follow-ups agora? Isso pode enviar mensagens para os contatos.')) {
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/run-now`, { method: 'POST' });
        const data = await response.json();
        alert(data.message);

        setTimeout(() => {
          loadStatus();
        }, 2000);
      } catch (error) {
        alert('Erro ao executar: ' + error.message);
      }
    }

    function refreshStatus() {
      loadStatus();
      alert('Status atualizado!');
    }

    function clearHistory() {
      if (confirm('Deseja limpar o histórico? Essa ação não pode ser desfeita.')) {
        followupHistory = [];
        loadStatus();
        alert('Histórico limpo!');
      }
    }

    // Atualizar a cada 30 segundos
    loadStatus();
    setInterval(loadStatus, 30000);
  </script>
</body>
</html>
